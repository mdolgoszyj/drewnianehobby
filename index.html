<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drewniane Hobby - sposób na siebie</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: #f7f7f5;
    color: #333;
}

header {
    height: 20vh;
    background: linear-gradient(rgba(0,0,0,0.3), rgba(47,93,58,0.6)), url('images/hero.jpg') center/cover;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    color: white;
    text-align: center;
}

header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 3rem;
    margin: 0;
    color: #f7f7f5;
}

header p {
    max-width:700px;
    margin-top:15px;
    font-size:1.1rem;
    line-height:1.6;
    color: #f7f7f5;
}

nav {
    position: absolute;
    top: 20px;
    right: 30px;
}

nav a {
    color: #f7f7f5;
    margin-left: 20px;
    text-decoration: none;
    font-weight: 500;
}

section {
    padding: 60px 20px;
    max-width: 1200px;
    margin: auto;
}

h2 {
    text-align: center;
    font-family: 'Playfair Display', serif;
    font-size: 2.2rem;
    margin-bottom: 40px;
    color: #2f5d3a;
}

.year-block {
    margin-bottom: 60px;
}

.year-title {
    font-size: 1.4rem;
    margin-bottom: 20px;
    border-left: 4px solid #2f5d3a;
    padding-left: 10px;
    color: #2f5d3a;
}

.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 250px));
    gap: 20px;
    justify-content: center;
}

.card {
    position: relative;
    overflow: hidden;
    border-radius: 12px;
    cursor: pointer;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    opacity: 0;
    transform: translateY(20px);
    animation: fadeInUp 0.6s forwards;
}

.card img {
    width: 100%;
    max-width: 300px;
    max-height: 180px;
    object-fit: cover;
    display: block;
    transition: transform 0.5s ease;
}

.card:hover img {
    transform: scale(1.05);
}

.overlay {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: linear-gradient(transparent, rgba(47,93,58,0.8));
    color: #f7f7f5;
    padding: 10px;
    opacity: 0;
    transition: 0.3s;
    font-size: 0.9rem;
}

.card:hover .overlay {
    opacity: 1;
}

@keyframes fadeInUp {
    to { opacity: 1; transform: translateY(0); }
}

.lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(15,30,20,0.95);
    justify-content: center;
    align-items: center;
    z-index: 999;
    flex-direction: column;
}

.lightbox img {
    max-width: 90%;
    max-height: 70%;
    margin-bottom: 10px;
    border-radius: 10px;
}

.lightbox p {
    color: #f7f7f5;
    font-size: 1.2rem;
    margin-bottom: 20px;
}

.close {
    position: absolute;
    top: 20px;
    right: 30px;
    color: #f7f7f5;
    font-size: 2rem;
    cursor: pointer;
}

.lightbox .nav {
    position: absolute;
    top: 50%;
    font-size: 3rem;
    color: #f7f7f5;
    cursor: pointer;
    user-select: none;
    transform: translateY(-50%);
    padding: 10px;
}

.lightbox .prev { left: 30px; }
.lightbox .next { right: 30px; }

footer {
    text-align: center;
    padding: 30px;
    background: #2f5d3a;
    color: #f7f7f5;
}
</style>
</head>
<body>

<header>
    <nav>
        <a href="#projekty">Projekty</a>
    </nav>
    <h1>Drewniane Hobby</h1>
    <p>W drewnie odnajduję spokój, a każda praca łączy pasję, precyzję i kreatywność.</p>
</header>

<section id="projekty">
    <h2>Projekty</h2>
</section>

<div class="lightbox" id="lightbox">
    <span class="close">&times;</span>
    <img id="lightbox-img">
    <p id="lightbox-desc"></p>
    <div class="nav prev">&#10094;</div>
    <div class="nav next">&#10095;</div>
</div>

<footer>
    <p>© 2026 drewnianehobby.pl</p>
</footer>

<script>
// --- DEFINICJA GRUP I ZDJĘĆ ---
const galerie = [
  {
    name: "Napisy",
    items: [
      { src: "images/napisy/n1.jpg", alt: "Ania&Darek", desc: "Ania&Darek" },
      { src: "images/napisy/n2.jpg", alt: "Filip", desc: "Filip" },
	  { src: "images/napisy/n3.jpg", alt: "Fabian", desc: "Fabian" },
	  { src: "images/napisy/n4.jpg", alt: "Gabrysia", desc: "Gabrysia" },
	  { src: "images/napisy/n5.jpg", alt: "Krystyna...", desc: "Krystyna..." },
	  { src: "images/napisy/n6.jpg", alt: "Emerytura...", desc: "Emerytura..." },
	  { src: "images/napisy/n7.jpg", alt: "2020", desc: "2020" },
	  { src: "images/napisy/n8.jpg", alt: "Czarne500+", desc: "Czarne500+" }
    ]
  },
  {
    name: "Zwierzęta",
    items: [
      { src: "images/zwierzeta/z1.jpg", alt: "Niedźwiedzie", desc: "Niedźwiedzie" },
      { src: "images/zwierzeta/z2.jpg", alt: "Dzik", desc: "Dzik" },
      { src: "images/zwierzeta/z3.jpg", alt: "Jeleń", desc: "Jeleń" }
    ]
  },
  {
    name: "Rośliny",
    items: [
      { src: "images/rosliny/r1.jpg", alt: "Yggdrasil", desc: "Yggdrasil" },
      { src: "images/rosliny/r2.jpg", alt: "Tulipany", desc: "Tulipany" }
    ]
  }
];

// --- GENEROWANIE GALERII ---
const projektySection = document.getElementById('projekty');

galerie.forEach(group => {
  const yearBlock = document.createElement('div');
  yearBlock.className = 'year-block';
  yearBlock.dataset.year = group.name;

  const title = document.createElement('div');
  title.className = 'year-title';
  title.textContent = group.name;
  yearBlock.appendChild(title);

  const galleryDiv = document.createElement('div');
  galleryDiv.className = 'gallery';

  group.items.forEach(item => {
    const card = document.createElement('div');
    card.className = 'card';
    
    const img = document.createElement('img');
    img.src = item.src;
    img.alt = item.alt;

    const overlay = document.createElement('div');
    overlay.className = 'overlay';
    overlay.textContent = item.desc;

    card.appendChild(img);
    card.appendChild(overlay);
    galleryDiv.appendChild(card);
  });

  yearBlock.appendChild(galleryDiv);
  projektySection.appendChild(yearBlock);
});

// --- LIGHTBOX ---
const cards = document.querySelectorAll('.card img');
const lightbox = document.getElementById('lightbox');
const lightboxImg = document.getElementById('lightbox-img');
const lightboxDesc = document.getElementById('lightbox-desc');
const closeBtn = document.querySelector('.close');
const prevBtn = document.querySelector('.prev');
const nextBtn = document.querySelector('.next');
let currentIndex = 0;

function openLightbox(index) {
    currentIndex = index;
    lightbox.style.display = 'flex';
    lightboxImg.src = cards[currentIndex].src;
    lightboxDesc.textContent = cards[currentIndex].alt + ' (' + cards[currentIndex].closest('.year-block').dataset.year + ')';
}

cards.forEach((img, i) => {
    img.addEventListener('click', () => openLightbox(i));
});

closeBtn.addEventListener('click', () => lightbox.style.display = 'none');
lightbox.addEventListener('click', (e) => { if (e.target === lightbox) lightbox.style.display = 'none'; });

prevBtn.addEventListener('click', () => {
    currentIndex = (currentIndex - 1 + cards.length) % cards.length;
    openLightbox(currentIndex);
});

nextBtn.addEventListener('click', () => {
    currentIndex = (currentIndex + 1) % cards.length;
    openLightbox(currentIndex);
});

document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') lightbox.style.display = 'none';
    if (e.key === 'ArrowLeft') prevBtn.click();
    if (e.key === 'ArrowRight') nextBtn.click();
});
</script>

</body>
</html>
