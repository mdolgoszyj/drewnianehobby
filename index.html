<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drewniane Hobby - Portfolio</title>
<meta name="description" content="Portfolio Drewniane Hobby – prezentacja moich drewnianych projektów, rękodzieła i pasji do drewna.">
<style>
    body, html {
        margin: 0;
        padding: 0;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        scroll-behavior: smooth;
        background-color: #fefcf8;
        color: #333;
    }

    header {
        height: 20vh;
        background-color: #3b7d3b;
        display: flex;
        justify-content: center;
        align-items: center;
        color: #fff;
        text-shadow: 2px 2px 6px rgba(0,0,0,0.5);
        flex-direction: column;
        text-align: center;
    }

    header h1 {
        font-size: 2.5rem;
        margin: 0;
    }

    nav {
        margin-top: 20px;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
    }

    nav a {
        color: #fff;
        margin: 0 15px;
        text-decoration: none;
        font-weight: bold;
        padding: 8px 12px;
        background-color: rgba(0,0,0,0.2);
        border-radius: 6px;
        transition: background 0.3s;
    }

    nav a:hover {
        background-color: rgba(0,0,0,0.4);
    }

    section {
        padding: 20px;
        max-width: 1200px;
        margin: auto;
    }

    section h2 {
        text-align: center;
        margin-bottom: 40px;
        font-size: 2rem;
        color: #8b5e3c;
    }

    .gallery {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 20px;
    }

    .gallery img {
        width: 100%;
        height: auto;
        border-radius: 8px;
        cursor: pointer;
        transition: transform 0.3s, box-shadow 0.3s;
        box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    }

    .gallery img:hover {
        transform: scale(1.05);
        box-shadow: 0 6px 14px rgba(0,0,0,0.3);
    }

    /* Lightbox styles */
    .lightbox {
        display: none;
        position: fixed;
        z-index: 1000;
        top:0; left:0;
        width:100%; height:100%;
        background: rgba(0,0,0,0.9);
        justify-content: center;
        align-items: center;
    }

    .lightbox-img {
        max-width: 90%;
        max-height: 90%;
        border-radius: 8px;
    }

    .lightbox .close {
        position: absolute;
        top: 20px;
        right: 30px;
        font-size: 2rem;
        color: #fff;
        cursor: pointer;
    }

    .lightbox .nav {
        position: absolute;
        top: 50%;
        font-size: 3rem;
        color: #fff;
        cursor: pointer;
        user-select: none;
        transform: translateY(-50%);
        padding: 10px;
    }

    .lightbox .prev {
        left: 50px; /* przesunięcie poza grafikę */
    }

    .lightbox .next {
        right: 50px; /* przesunięcie poza grafikę */
    }

    footer {
        background-color: #8b5e3c;
        color: #fff;
        text-align: center;
        padding: 20px 10px;
    }

    footer a {
        color: #fff;
        margin: 0 8px;
        text-decoration: none;
    }

    @media(max-width: 600px){
        header h1 {
            font-size: 2rem;
        }
        nav a {
            margin: 5px;
            padding: 6px 10px;
            font-size: 0.9rem;
        }
    }

    @media(max-width: 400px){
        .gallery {
            gap: 10px;
        }
    }
</style>
</head>
<body>

<header>
    <h1>Drewniane Hobby</h1>
    <nav>
        <a href="#o-mnie" title="O mnie">O mnie</a>
        <a href="#projekty" title="Moje projekty">Projekty</a>
    </nav>
</header>

<section id="o-mnie">
    <h2>O mnie</h2>
    <p>W drewnie odnajduję spokój, a każda praca łączy pasję, precyzję i kreatywność.</p>
</section>

<section id="projekty">
    <h2>Moje projekty</h2>
    <div class="gallery">
        <img src="images/projekt1.jpg" alt="Projekt 1" loading="lazy">
        <img src="images/projekt2.jpg" alt="Projekt 2" loading="lazy">
        <img src="images/projekt3.jpg" alt="Projekt 3" loading="lazy">
        <img src="images/projekt4.jpg" alt="Projekt 4" loading="lazy">
        <img src="images/projekt5.jpg" alt="Projekt 5" loading="lazy">
        <img src="images/projekt6.jpg" alt="Projekt 6" loading="lazy">
        <img src="images/projekt7.jpg" alt="Projekt 7" loading="lazy">
        <img src="images/projekt8.jpg" alt="Projekt 8" loading="lazy">
        <img src="images/projekt9.jpg" alt="Projekt 9" loading="lazy">
        <img src="images/projekt10.jpg" alt="Projekt 10" loading="lazy">
        <img src="images/projekt11.jpg" alt="Projekt 11" loading="lazy">
        <img src="images/projekt12.jpg" alt="Projekt 12" loading="lazy">
        <img src="images/projekt13.jpg" alt="Projekt 13" loading="lazy">
    </div>

    <!-- Lightbox -->
    <div id="lightbox" class="lightbox">
        <span class="close">&times;</span>
        <img class="lightbox-img" src="" alt="">
        <div class="nav prev">&#10094;</div>
        <div class="nav next">&#10095;</div>
    </div>
</section>

<footer>
    <p>&copy; 2026 drewnianehobby.pl | kontakt@drewnianehobby.pl</p>
</footer>

<script>
const galleryImages = document.querySelectorAll('.gallery img');
const lightbox = document.getElementById('lightbox');
const lightboxImg = document.querySelector('.lightbox-img');
const closeBtn = document.querySelector('.lightbox .close');
const prevBtn = document.querySelector('.lightbox .prev');
const nextBtn = document.querySelector('.lightbox .next');
const body = document.body;

let currentIndex = 0;

// Funkcja do otwierania lightboxa
function openLightbox(index) {
    currentIndex = index;
    lightboxImg.src = galleryImages[currentIndex].src;
    lightboxImg.alt = galleryImages[currentIndex].alt;
    lightbox.style.display = 'flex';
    body.style.overflow = 'hidden'; // blokuje przewijanie strony
}

// Funkcja do zamykania lightboxa
function closeLightbox() {
    lightbox.style.display = 'none';
    body.style.overflow = ''; // przywraca przewijanie
}

// Otwieranie lightboxa po kliknięciu w obraz
galleryImages.forEach((img, index) => {
    img.addEventListener('click', () => openLightbox(index));
});

// Zamknięcie
closeBtn.addEventListener('click', closeLightbox);

// Nawigacja
prevBtn.addEventListener('click', () => {
    currentIndex = (currentIndex - 1 + galleryImages.length) % galleryImages.length;
    lightboxImg.src = galleryImages[currentIndex].src;
    lightboxImg.alt = galleryImages[currentIndex].alt;
});

nextBtn.addEventListener('click', () => {
    currentIndex = (currentIndex + 1) % galleryImages.length;
    lightboxImg.src = galleryImages[currentIndex].src;
    lightboxImg.alt = galleryImages[currentIndex].alt;
});

// Zamknięcie po kliknięciu w tło
lightbox.addEventListener('click', (e) => {
    if (e.target === lightbox) closeLightbox();
});
</script>

</body>
</html>
